events { worker_connections 1024; }

http {
    # Custom log format to track which backend container IP received the request
    log_format upstreamlog '[$time_local] Client: $remote_addr routed to: $upstream_addr -> Request: "$request" Status: $status';

    # Docker's internal DNS resolver (enables dynamic re-resolution of scaled containers)
    resolver 127.0.0.11 valid=1s;

    upstream backend_servers {
        server backend:3001;
    }

    upstream frontend_servers {
        server frontend:3000;
    }

    server {
        listen 80;

        access_log /var/log/nginx/access.log upstreamlog;

        # Route chatbot API requests to the Express backend load balancer
        location = /api/chat {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route chatbot ingestion requests to the Express backend load balancer
        location = /api/ingest-embeddings {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route all other traffic to Next.js frontend
        location / {
            proxy_pass http://frontend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Enable WebSockets support (crucial for Next.js hot-reloading/HMR)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
